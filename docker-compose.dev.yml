version: '3.5'

networks:
  internal:

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: sc_map
      POSTGRES_PASSWORD: sc_map
      POSTGRES_DB: sc_map
    ports:
      - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sc_map -d sc_map']
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  db_data:
