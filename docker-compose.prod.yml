networks:
  internal:

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: sc_map
      POSTGRES_PASSWORD: sc_map
      POSTGRES_DB: sc_map
    volumes:
      - ${DB_DATA_PATH:-./db_data}:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sc_map -d sc_map']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        PUBLIC_GOOGLE_MAPS_API_KEY: ${PUBLIC_GOOGLE_MAPS_API_KEY}
        PUBLIC_DISCORD_CLIENT_ID: ${PUBLIC_DISCORD_CLIENT_ID}
    restart: unless-stopped

    expose:
      - '3000'

    networks:
      - internal

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - ${IMAGES_PATH:-./images}:/app/images

    environment:
      SQL_URL: postgres://sc_map:sc_map@db:5432/sc_map
      ORIGIN: ${ORIGIN}
      PUBLIC_GOOGLE_MAPS_API_KEY: ${PUBLIC_GOOGLE_MAPS_API_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_GOATED_ROLE_ID: ${DISCORD_GOATED_ROLE_ID}
      BODY_SIZE_LIMIT: '33554432' # 32MB — supports up to 3×10MB image uploads
      IMAGES_DIR: /app/images

  backup:
    image: postgres:17-alpine
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ${BACKUP_PATH:-./backups}:/backups
      - ./scripts/backup-entrypoint.sh:/entrypoint.sh:ro
    environment:
      PGHOST: db
      PGDATABASE: sc_map
      PGUSER: sc_map
      PGPASSWORD: sc_map
      KEEP_DAYS: '7'
    entrypoint: ['/bin/bash', '/entrypoint.sh']

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}

    networks:
      - internal
    depends_on:
      - app
