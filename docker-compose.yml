services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: sc_map
      POSTGRES_PASSWORD: sc_map
      POSTGRES_DB: sc_map
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

volumes:
  db_data:
